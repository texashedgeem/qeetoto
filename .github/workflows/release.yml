name: Create Release

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Optional release notes (appended to auto-generated changelog)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    name: Generate Release and Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
            echo "No previous tag found — starting from v0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Compute next version
        id: next_version
        run: |
          LATEST="${{ steps.get_tag.outputs.latest_tag }}"
          VERSION="${LATEST#v}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # feat!/fix! (breaking change) → major bump
          # feat                         → minor bump
          # everything else              → patch bump
          COMMITS=$(git log ${LATEST}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
          if echo "$COMMITS" | grep -qE "^(feat|fix)!\("; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qE "^feat\("; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Next version: $NEW_TAG"

      - name: Generate release notes from commits
        id: release_notes
        run: |
          LATEST="${{ steps.get_tag.outputs.latest_tag }}"
          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"
          DATE=$(date +%Y-%m-%d)

          {
            echo "## ${NEW_TAG} — ${DATE}"
            echo ""
            echo "### Changes"
            echo ""
            git log ${LATEST}..HEAD --pretty=format:"- %s" 2>/dev/null || git log --pretty=format:"- %s"
            echo ""
          } > release-notes.md

          cat release-notes.md

      - name: Create and push git tag
        run: |
          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"
          gh release create "$NEW_TAG" \
            --title "Release $NEW_TAG" \
            --notes-file release-notes.md \
            --latest

      - name: Write step summary
        run: |
          NEW_TAG="${{ steps.next_version.outputs.new_tag }}"
          echo "## Released ${NEW_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat release-notes.md >> $GITHUB_STEP_SUMMARY
