name: CI — Playwright Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Run Playwright functional tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start Next.js dev server
        run: npm run dev &
        env:
          NODE_ENV: development

      - name: Wait for Next.js to be ready
        run: |
          echo "Waiting for Next.js on port 3000..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q "200\|301\|302"; then
              echo "Next.js is up after ${i}s"
              break
            fi
            echo "  attempt $i/30..."
            sleep 2
          done

      - name: Run Playwright tests
        run: npm test

      - name: Write job summary
        if: always()
        run: |
          echo "## Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f tests/reports/junit/results.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' tests/reports/junit/results.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' tests/reports/junit/results.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' tests/reports/junit/results.xml | head -1 | grep -o '[0-9]*')
            PASSED=$((TESTS - FAILURES - ERRORS))
            echo "| Tests run | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | ✅ $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $( [ "$FAILURES" -gt 0 ] && echo "❌ $FAILURES" || echo "0" ) |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $( [ "$ERRORS" -gt 0 ] && echo "❌ $ERRORS" || echo "0" ) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ JUnit report not found — tests may not have run." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: tests/reports/
          retention-days: 30
